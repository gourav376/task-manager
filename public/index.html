<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background-color: #f4f4f9;
      display: flex;
      justify-content: center;
      padding-top: 50px;
      margin: 0;
    }
    .container {
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 400px;
    }
    .input-group { display: flex; margin-bottom: 20px; }
    input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px 0 0 4px; }
    button { padding: 10px 15px; border: none; background: #007bff; color: white; cursor: pointer; border-radius: 0 4px 4px 0; }
    button:hover { background: #0056b3; }
    .task { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
    .delete-btn { background: #dc3545; border-radius: 4px; font-size: 0.8rem; padding: 5px 10px; }
    .delete-btn:hover { background: #c82333; }
  </style>
</head>
<body>

  <div class="container">
    <h2>Task Manager</h2>
    
    <div class="input-group">
      <input type="text" id="taskInput" placeholder="What needs to be done?">
      <button onclick="addTask()">Add Task</button>
    </div>

    <div id="taskList">
      </div>
  </div>

  <script>
    // 1. Fetch tasks from the Node backend
    async function fetchTasks() {
      const response = await fetch('/api/tasks');
      const tasks = await response.json();
      
      const taskList = document.getElementById('taskList');
      taskList.innerHTML = ''; // Clear current list

      tasks.forEach(task => {
        taskList.innerHTML += `
          <div class="task">
            <span>${task.title}</span>
            <button class="delete-btn" onclick="deleteTask('${task._id}')">Delete</button>
          </div>
        `;
      });
    }

    // 2. Add a new task
    async function addTask() {
      const input = document.getElementById('taskInput');
      if (!input.value) return;

      await fetch('/api/tasks', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title: input.value })
      });

      input.value = ''; // Clear input field
      fetchTasks();     // Refresh the list
    }

    // 3. Delete a task
    async function deleteTask(id) {
      await fetch(`/api/tasks/${id}`, { method: 'DELETE' });
      fetchTasks(); // Refresh the list
    }

    // Load tasks as soon as the page opens
    fetchTasks();
  </script>

</body>
</html>
